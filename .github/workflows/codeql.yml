# CodeQL — Deep taint analysis (Tier 3)
# Core Rule 3.8: Security — catches path traversal, injection, taint flows
# that Bandit + Semgrep miss (inter-procedural analysis)
# Free for public repos. For private: evaluate cost vs Bandit+Semgrep coverage.

name: CodeQL Security Analysis

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'requirements.txt'
  pull_request:
    branches: [main]
  schedule:
    # Run weekly — taint analysis is slow
    - cron: '0 4 * * 0'

jobs:
  analyze:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: python
          queries: +security-and-quality
          config: |
            paths:
              - backend/
            paths-ignore:
              - tests/
              - .venv/

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:python"
          upload: true
