# mypy.ini — Mediastack v4 type checking config
# Created in step 1.2 (Static Type Checking)
# See: docs/cleanup/STEP_1_2_MYPY_STRATEGY.md

[mypy]
python_version = 3.12
strict = True
plugins = pydantic.mypy
files = backend/

# Tests, migrations, scripts, tooling: out of scope for step 1.2
# (see strategy doc §2.3 for rationale on each)
exclude = ^(backend/scripts/|tests/|migrations/|tools/|ms-)

# Make stale ignores show up at commit time, not later
warn_unused_ignores = True

# Per-Pydantic-plugin recommendation: tighten BaseModel construction
[pydantic-mypy]
init_forbid_extra = True
init_typed = True
warn_required_dynamic_aliases = True

# ── Third-party libraries without stubs ──────────────────────────────────
# Docker SDK has long-standing incomplete type info
[mypy-docker.*]
ignore_missing_imports = True

# chromadb has no published stubs
[mypy-chromadb.*]
ignore_missing_imports = True
